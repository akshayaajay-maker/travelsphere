<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Booking - TravelSphere</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #0a1931;
      --gold: #d4af37;
      --maroon: #800000;
      --light: #f5f5f5;
      --white: #ffffff;
      --border: #d8deea;
      --text: #2b3442;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Poppins', sans-serif; background: var(--light); color: var(--text); }

    .navbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--navy);
      min-height: 72px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 6%;
    }
    .logo {
      color: #fff;
      text-decoration: none;
      font-family: 'Fraunces', serif;
      font-size: 1.5rem;
      letter-spacing: 1px;
    }
    .logo span { color: var(--gold); }
    .home-link {
      color: #fff;
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .hero {
      background: var(--navy);
      color: #fff;
      text-align: center;
      padding: 42px 6% 54px;
    }
    .hero h1 {
      font-family: 'Fraunces', serif;
      font-size: clamp(2rem, 4.8vw, 3rem);
      margin-bottom: 8px;
    }
    .hero h1 span { color: var(--gold); }
    .hero p { max-width: 560px; margin: 0 auto; opacity: 0.9; font-size: 0.94rem; }

    .container {
      max-width: 620px;
      margin: -22px auto 56px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 10px;
      background: #eef2f8;
    }
    .tab-btn {
      border: none;
      padding: 10px;
      border-radius: 9px;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.84rem;
      color: #53627a;
      background: transparent;
    }
    .tab-btn.active {
      background: var(--navy);
      color: #fff;
    }

    .form-pane { display: none; padding: 22px; }
    .form-pane.active { display: block; }

    .title {
      font-family: 'Fraunces', serif;
      font-size: 1.15rem;
      color: var(--navy);
      margin-bottom: 14px;
      text-align: center;
    }

    .form-stack {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-size: 0.78rem;
      font-weight: 700;
      color: #344863;
    }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      font: inherit;
      font-size: 0.9rem;
      outline: none;
      background: #fff;
    }
    input:focus, select:focus, textarea:focus { border-color: #91a6c4; }

    .summary {
      margin-top: 4px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #f8f9fc;
      padding: 12px;
      font-size: 0.9rem;
    }
    .row { display: flex; justify-content: space-between; margin-bottom: 6px; }
    .total {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
      font-weight: 700;
      color: var(--maroon);
    }

    .btn {
      margin-top: 8px;
      width: 100%;
      border: none;
      border-radius: 999px;
      padding: 12px;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      background: var(--maroon);
    }
    .btn.alt { background: var(--navy); }
  </style>
</head>
<body>
  <nav class="navbar">
    <a class="logo" href="index.html">TRAVEL<span>SPHERE</span></a>
    <a class="home-link" href="index.html">Home</a>
  </nav>

  <header class="hero">
    <h1>Book Your <span>Journey</span></h1>
    <p>Choose a package or plan a custom trip in a few quick steps.</p>
  </header>

  <main class="container">
    <div class="tabs">
      <button class="tab-btn active" data-tab="package">Package Booking</button>
      <button class="tab-btn" data-tab="plan">Plan a Trip</button>
    </div>

    <section id="package" class="form-pane active">
      <h2 class="title">Package Booking</h2>

      <form class="form-stack" onsubmit="confirmBooking(event)">
        <div>
          <label>Full Name</label>
          <input id="pkgName" type="text" required />
        </div>

        <div>
          <label>Email</label>
          <input id="pkgEmail" type="email" required />
        </div>

        <div>
          <label>Date of Birth</label>
          <input id="dob" type="date" required />
        </div>

        <div>
          <label>Package</label>
          <select id="pkg" onchange="updateTotal()" required>
            <option value="0">Choose a package</option>
            <option value="50000">Amazing India - Rs. 50,000</option>
            <option value="120000">European Escape - Rs. 1,20,000</option>
            <option value="60000">Bali Retreat - Rs. 60,000</option>
            <option value="70000">Dubai Luxury - Rs. 70,000</option>
          </select>
        </div>

        <div>
          <label>Travelers</label>
          <select id="travellers" onchange="updateTotal()">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
          </select>
        </div>

        <div class="summary">
          <div class="row"><span>Package</span><span id="sPkg">Rs. 0</span></div>
          <div class="row"><span>Travelers</span><span id="sTrav">1</span></div>
          <div class="row"><span>Date of Birth</span><span id="sDob">-</span></div>
          <div class="row total"><span>Total</span><span id="sTotal">Select a package</span></div>
        </div>

        <button class="btn" type="submit">Confirm Booking</button>
      </form>
    </section>

    <section id="plan" class="form-pane">
      <h2 class="title">Plan a Trip</h2>

      <form class="form-stack" onsubmit="submitPlan(event)">
        <div>
          <label>Full Name</label>
          <input id="planName" type="text" required />
        </div>

        <div>
          <label>Email</label>
          <input id="planEmail" type="email" required />
        </div>

        <div>
          <label>Preferred Destination(s)</label>
          <input id="planDestination" type="text" placeholder="e.g. Iceland, Japan" required />
        </div>

        <div>
          <label>Trip Duration</label>
          <select required>
            <option>5-7 Days</option>
            <option>8-10 Days</option>
            <option>11-14 Days</option>
          </select>
        </div>

        <div>
          <label>Budget Range</label>
          <select required>
            <option>Rs. 50,000 - Rs. 1,00,000</option>
            <option>Rs. 1,00,000 - Rs. 2,00,000</option>
            <option>Rs. 2,00,000+</option>
          </select>
        </div>

        <div>
          <label>Trip Notes</label>
          <textarea id="planNotes" rows="4" placeholder="Tell us what kind of trip you want" required></textarea>
        </div>

        <button class="btn alt" type="submit">Submit Plan Request</button>
      </form>
    </section>
  </main>

  <script>
    const tabButtons = document.querySelectorAll('.tab-btn');
    const panes = document.querySelectorAll('.form-pane');

    tabButtons.forEach((btn) => {
      btn.addEventListener('click', () => {
        tabButtons.forEach((b) => b.classList.remove('active'));
        panes.forEach((p) => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab).classList.add('active');
      });
    });

    const pkg = document.getElementById('pkg');
    const travellers = document.getElementById('travellers');
    const dob = document.getElementById('dob');
    dob.addEventListener('input', updateTotal);

    function isValidEmail(value) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
    }

    function getAgeFromDOB(dobValue) {
      const birth = new Date(dobValue);
      const today = new Date();
      let years = today.getFullYear() - birth.getFullYear();
      const monthDiff = today.getMonth() - birth.getMonth();
      if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birth.getDate())) years--;
      return years;
    }

    function updateTotal() {
      const pkgPrice = Number(pkg.value);
      const count = Number(travellers.value);
      const dobValue = dob.value ? dob.value : '-';

      document.getElementById('sPkg').innerText = `Rs. ${pkgPrice.toLocaleString()}`;
      document.getElementById('sTrav').innerText = count;
      document.getElementById('sDob').innerText = dobValue;

      if (!pkgPrice) {
        document.getElementById('sTotal').innerText = 'Select a package';
        return;
      }

      const total = pkgPrice * count;
      document.getElementById('sTotal').innerText = `Rs. ${total.toLocaleString()}`;
    }

    function confirmBooking(event) {
      event.preventDefault();
      const name = document.getElementById('pkgName').value.trim();
      const email = document.getElementById('pkgEmail').value.trim();
      const dobValue = document.getElementById('dob').value;

      if (name.length < 2) {
        alert('Please enter a valid full name.');
        return;
      }
      if (!isValidEmail(email)) {
        alert('Please enter a valid email address.');
        return;
      }
      if (!dobValue) {
        alert('Please select date of birth.');
        return;
      }
      if (getAgeFromDOB(dobValue) < 18) {
        alert('Booking is allowed only for travelers aged 18 or above.');
        return;
      }
      if (!Number(pkg.value)) {
        alert('Please choose a package.');
        return;
      }
      alert('Booking confirmed. We will send your confirmation shortly.');
      window.location.href = 'index.html';
    }

    function submitPlan(event) {
      event.preventDefault();
      const name = document.getElementById('planName').value.trim();
      const email = document.getElementById('planEmail').value.trim();
      const destination = document.getElementById('planDestination').value.trim();
      const notes = document.getElementById('planNotes').value.trim();

      if (name.length < 2) {
        alert('Please enter a valid full name.');
        return;
      }
      if (!isValidEmail(email)) {
        alert('Please enter a valid email address.');
        return;
      }
      if (destination.length < 2) {
        alert('Please enter preferred destination(s).');
        return;
      }
      if (notes.length < 10) {
        alert('Please add a few more details in trip notes.');
        return;
      }
      alert('Plan request submitted. Our team will contact you soon.');
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
