<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up - TravelSphere</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #0a1931;
      --gold: #d4af37;
      --maroon: #800000;
      --light: #f5f5f5;
      --white: #ffffff;
      --border: #d8deea;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Poppins', sans-serif; background: var(--light); color: #253043; }
    .top { max-width: 460px; margin: 26px auto 0; text-align: right; }
    .top a { color: var(--navy); text-decoration: none; font-size: 0.82rem; font-weight: 600; }
    .wrap { max-width: 460px; margin: 56px auto; background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 22px; }
    h1 { font-family: 'Fraunces', serif; color: var(--navy); font-size: 1.9rem; margin-bottom: 8px; text-align: center; }
    p { font-size: 0.9rem; color: #5b6575; text-align: center; margin-bottom: 16px; }
    label { display: block; font-size: 0.78rem; font-weight: 700; color: #334862; margin-bottom: 5px; }
    input { width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 10px; margin-bottom: 11px; font: inherit; }
    .btn { width: 100%; border: none; border-radius: 999px; padding: 11px; font-weight: 700; color: #fff; background: var(--maroon); margin-top: 4px; }
    .socials { margin-top: 14px; display: grid; gap: 8px; }
    .social-btn { border: 1px solid var(--border); border-radius: 8px; padding: 10px; text-align: center; background: #fff; font-weight: 600; color: #364962; }
    .foot { text-align: center; margin-top: 14px; font-size: 0.82rem; }
    .foot a { color: var(--navy); text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div class="top"><a href="index.html">Back to Home</a></div>
  <main class="wrap">
    <h1>Create Account</h1>
    <p>Sign up to save trips and manage bookings.</p>

    <form>
      <label>Full Name</label>
      <input type="text" placeholder="Enter full name" />

      <label>Email</label>
      <input type="email" placeholder="Enter email" />

      <label>Phone</label>
      <input type="tel" placeholder="Enter phone number" />

      <label>Password</label>
      <input type="password" placeholder="Create password" />

      <label>Confirm Password</label>
      <input type="password" placeholder="Confirm password" />

      <button type="button" class="btn" onclick="window.location.href='index.html'">Sign Up</button>
    </form>

    <div class="socials">
      <div class="social-btn">Continue with Google</div>
      <div class="social-btn">Continue with Facebook</div>
    </div>

    <div class="foot">Already have an account? <a href="login.html">Login</a></div>
  </main>
</body>
</html>
